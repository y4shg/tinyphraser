<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reword</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOADING OVERLAY -->
  <div id="load-overlay" class="load-overlay">
    <p class="load-label">Loading model<span class="dots"></span></p>
    <div class="load-track"><div class="load-bar" id="load-bar"></div></div>
    <p id="load-status" class="load-status">Initializing…</p>
    <p class="load-note">Runs entirely in your browser.</p>
  </div>

  <!-- APP -->
  <div id="app" class="app hidden">

    <!-- LEFT: Email input + output -->
    <div class="col col-left">

      <div class="field">
        <label for="email-input">Your email</label>
        <textarea id="email-input" placeholder="Paste your email here…" spellcheck="true"></textarea>
      </div>

      <div class="tone-row">
        <span class="label">Tone</span>
        <div id="tone-pills">
          <button class="pill active" data-tone="professional">Professional</button>
          <button class="pill" data-tone="casual">Casual</button>
          <button class="pill" data-tone="concise">Concise</button>
          <button class="pill" data-tone="friendly">Friendly</button>
          <button class="pill" data-tone="assertive">Assertive</button>
        </div>
      </div>

      <button id="rephrase-btn" class="rephrase-btn" disabled>Rephrase →</button>

      <div id="output-block" class="field hidden">
        <div class="output-header">
          <label>Rephrased</label>
          <button id="copy-btn" class="copy-btn">Copy</button>
        </div>
        <div id="output-text" class="output-text"></div>
      </div>

    </div>

    <!-- RIGHT: Chat -->
    <div class="col col-right">

      <div class="chat-window" id="chat-window">
        <div id="chat-empty" class="chat-empty">
          <p>Rephrase an email, then ask anything about it.</p>
          <p class="hint">"Make it shorter" · "Too blunt?" · "Formal subject line"</p>
        </div>
      </div>

      <form class="chat-form" id="chat-form">
        <textarea id="chat-input" class="chat-input" placeholder="Ask something…" rows="1" disabled></textarea>
        <button type="submit" id="send-btn" class="send-btn" disabled>Send</button>
      </form>

    </div>

  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
